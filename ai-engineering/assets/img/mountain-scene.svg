<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 2048 1152"
  width="2048"
  height="1152"
>
  <defs>
    <style>
      .cp-ring {
        fill: rgba(255,255,255,0.96);
        stroke: #c98542;
        stroke-width: 3;
      }

      .cp-text {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 700;
        fill: #b06f35;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .guide-dot {
        fill: rgba(255,255,255,0.92);
        stroke: rgba(90,70,50,0.45);
        stroke-width: 2;
      }

      .route-debug {
        fill: none;
        stroke: rgba(0,0,0,0.001);
        stroke-width: 8;
      }
    </style>
  </defs>

  <image
    href="mountain.png"
    x="0"
    y="0"
    width="2048"
    height="1152"
    preserveAspectRatio="xMidYMid meet"
  />

  <polyline
    id="route-polyline"
    class="route-debug"
    points="260,851 606,782 940,749 1299,634 1570,552 1860,444 1428,332 1810,253 1935,97"
  />

  <g id="checkpoints">
    <g id="cp-base" data-key="base" transform="translate(260,851)">
      <circle class="cp-ring" r="28"/>
      <text class="cp-text" x="0" y="2">Base</text>
    </g>

    <g id="cp-c1" data-key="C1" transform="translate(606,782)">
      <circle class="cp-ring" r="28"/>
      <text class="cp-text" x="0" y="2">C1</text>
    </g>

    <g id="cp-c2" data-key="C2" transform="translate(940,749)">
      <circle class="cp-ring" r="28"/>
      <text class="cp-text" x="0" y="2">C2</text>
    </g>

    <g id="cp-c3" data-key="C3" transform="translate(1299,634)">
      <circle class="cp-ring" r="28"/>
      <text class="cp-text" x="0" y="2">C3</text>
    </g>

    <g id="cp-c4" data-key="C4" transform="translate(1570,552)">
      <circle class="cp-ring" r="28"/>
      <text class="cp-text" x="0" y="2">C4</text>
    </g>

    <g id="cp-c5" data-key="C5" transform="translate(1860,444)">
      <circle class="cp-ring" r="28"/>
      <text class="cp-text" x="0" y="2">C5</text>
    </g>

    <g id="cp-c6" data-key="C6" transform="translate(1428,332)">
      <circle class="cp-ring" r="28"/>
      <text class="cp-text" x="0" y="2">C6</text>
    </g>

    <g id="cp-c7" data-key="C7" transform="translate(1810,253)">
      <circle class="cp-ring" r="28"/>
      <text class="cp-text" x="0" y="2">C7</text>
    </g>

    <g id="cp-c8" data-key="C8" transform="translate(1935,97)">
      <circle class="cp-ring" r="28"/>
      <text class="cp-text" x="0" y="2">C8</text>
    </g>
  </g>

  <g id="debug-guides" opacity="0">
    <circle class="guide-dot" cx="260" cy="851" r="8"/>
    <circle class="guide-dot" cx="606" cy="782" r="8"/>
    <circle class="guide-dot" cx="940" cy="749" r="8"/>
    <circle class="guide-dot" cx="1299" cy="634" r="8"/>
    <circle class="guide-dot" cx="1570" cy="552" r="8"/>
    <circle class="guide-dot" cx="1860" cy="444" r="8"/>
    <circle class="guide-dot" cx="1428" cy="332" r="8"/>
    <circle class="guide-dot" cx="1810" cy="253" r="8"/>
    <circle class="guide-dot" cx="1935" cy="97" r="8"/>
  </g>

  <g id="teams-layer"></g>
</svg>
